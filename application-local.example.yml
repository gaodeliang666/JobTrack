# Copy this file to application-local.yml for local use. The copied file is ignored by Git.
# Supply all values from the local process environment; do not place real credentials here.
spring:
  datasource:
    url: ${JOBTRACK_DB_URL}
    username: ${JOBTRACK_DB_USERNAME}
    password: ${JOBTRACK_DB_PASSWORD}

jobtrack:
  current-user-id: ${JOBTRACK_CURRENT_USER_ID}
